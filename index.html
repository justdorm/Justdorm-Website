<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="description" content="Justin Dormitzer — Motion Designer and Creative Technologist. Portfolio featuring motion design, interactive installations, and generative art.">
    <link rel="icon" type="image/x-icon" href="imgs/fav.png">
    <link rel="stylesheet" type="text/css" href="Precious_Sans.css">
    <link rel="stylesheet" href="homepage-styles.css">
</head>

<body>

    <!-- Three.js 3D Canvas -->
    <canvas id="jd-scene"></canvas>

    <!-- Noise grain overlay -->
    <canvas id="noise" class="noise"></canvas>

    <!-- Loading indicator -->
    <div id="loading-text" class="loading-text">Loading</div>

    <!-- Navigation Overlay -->
    <div class="nav-overlay">
        <a id="nav-motion" class="nav-link nav-link--left" href="motion.html">Motion Design</a>
        <a id="nav-creative" class="nav-link nav-link--right" href="CreativeTechnology.html">Creative Technology</a>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <a href="about.html">About</a>
        <a href="https://www.instagram.com/justdorm/"><img class="ig-img" src="imgs/ig logo.png" alt="Instagram"></a>
    </div>

    <!-- Import Map for Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
    }
    </script>

    <!-- Noise Grain Script -->
    <script>
    (function() {
        const c = document.getElementById('noise');
        const ctx = c.getContext('2d');
        function resize() {
            c.width = window.innerWidth * window.devicePixelRatio;
            c.height = window.innerHeight * window.devicePixelRatio;
            c.style.width = window.innerWidth + 'px';
            c.style.height = window.innerHeight + 'px';
        }
        resize();
        window.addEventListener('resize', resize);
        function noise() {
            const w = c.width, h = c.height;
            const iData = ctx.createImageData(w, h);
            const buf = new Uint32Array(iData.data.buffer);
            for (let i = 0; i < buf.length; i++) {
                if (Math.random() < 0.5) buf[i] = 0xffffffff;
            }
            ctx.putImageData(iData, 0, 0);
        }
        (function loop() { noise(); requestAnimationFrame(loop); })();
    })();
    </script>

    <!-- 3D Scene -->
    <script type="module" src="homepage-scene.js"></script>

</body>
</html>
