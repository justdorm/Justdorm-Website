<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Justdorm — Motion Design & Creative Technology">
    <meta property="og:description" content="Justin Dormitzer — Motion Designer and Creative Technologist. Portfolio featuring motion design, interactive installations, and generative art.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://justdorm.com/">
    <meta property="og:image" content="https://justdorm.com/imgs/web/og-home.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/x-icon" href="imgs/fav.png">
    <link rel="stylesheet" type="text/css" href="Precious_Sans.css">
    <link rel="stylesheet" href="homepage-styles.css">
    <script>
    // Snapshot bridge: show a pre-rendered logo image (or a runtime capture)
    // as the canvas background BEFORE the view-transition captures the
    // incoming snapshot.  Must be inline — module scripts miss the window.
    //
    // Pre-rendered images:  imgs/logo-phase-0.png  (cyan combo)
    //                       imgs/logo-phase-1.png  (magenta combo)
    //                       imgs/logo-phase-2.png  (yellow combo)
    window.addEventListener('pagereveal', function(e) {
      if (!e || !e.viewTransition) return;
      var cv = document.getElementById('jd-scene');
      if (!cv) return;

      // Pick the image source: runtime capture (homepage→homepage) or
      // pre-rendered phase image (interior→homepage).
      var src = '';
      try {
        var snap = sessionStorage.getItem('jdLogoSnapshot');
        if (snap) {
          src = snap;
          sessionStorage.removeItem('jdLogoSnapshot');
        } else {
          var phase = Math.round(parseFloat(sessionStorage.getItem('jdColorPhase')) || 0);
          var idx = ((phase % 3) + 3) % 3;
          src = 'imgs/logo-phase-' + idx + '.png';
        }
      } catch (e) {
        src = 'imgs/logo-phase-0.png';
      }

      cv.style.backgroundImage = 'url(' + src + ')';
      cv.style.backgroundSize = 'cover';
      cv.style.backgroundRepeat = 'no-repeat';
      cv.style.backgroundPosition = 'center';

      var ld = document.getElementById('loading-text');
      if (ld) ld.style.display = 'none';
    });
    </script>
</head>

<body>

    <!-- Three.js 3D Canvas -->
    <canvas id="jd-scene"></canvas>

    <!-- Noise grain overlay -->
    <canvas id="noise" class="noise"></canvas>

    <!-- Loading indicator -->
    <div id="loading-text" class="loading-text">Loading</div>

    <!-- Gyroscope Prompt -->
    <div id="gyro-prompt" class="gyro-prompt">Tap anywhere to enable rotation</div>

    <!-- Navigation Overlay -->
    <div class="nav-overlay">
        <a id="nav-motion" class="nav-link nav-link--left" href="motion.html">Motion Design</a>
        <a id="nav-creative" class="nav-link nav-link--right" href="CreativeTechnology.html">Creative Technology</a>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <a href="about.html">About</a>
        <a href="https://www.instagram.com/justdorm/"><img class="ig-img" src="imgs/ig logo.png" alt="Instagram"></a>
    </div>

    <!-- Import Map for Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "./vendor/three/three.module.min.js",
            "three/addons/": "./vendor/three/addons/"
        }
    }
    </script>

    <!-- Noise Grain Script -->
    <script>
    (function() {
        const c = document.getElementById('noise');
        const ctx = c.getContext('2d');
        function resize() {
            c.width = window.innerWidth * window.devicePixelRatio;
            c.height = window.innerHeight * window.devicePixelRatio;
            c.style.width = window.innerWidth + 'px';
            c.style.height = window.innerHeight + 'px';
        }
        resize();
        window.addEventListener('resize', resize);
        function noise() {
            const w = c.width, h = c.height;
            const iData = ctx.createImageData(w, h);
            const buf = new Uint32Array(iData.data.buffer);
            for (let i = 0; i < buf.length; i++) {
                if (Math.random() < 0.5) buf[i] = 0xffffffff;
            }
            ctx.putImageData(iData, 0, 0);
        }
        (function loop() { noise(); requestAnimationFrame(loop); })();
    })();
    </script>

    <!-- 3D Scene -->
    <script type="module" src="homepage-scene.js"></script>

</body>
</html>
