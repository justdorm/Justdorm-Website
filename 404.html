<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" type="text/css" href="Precious_Sans.css">
    <link rel="stylesheet" href="site.css">
    <script>
    // Ensure view-transition morph targets are visible before Chrome's snapshot
    // (must be inline - deferred scripts miss pagereveal on cold loads)
    window.addEventListener('pagereveal', function(e) {
      if (!e || !e.viewTransition) return;
      document.querySelectorAll('.page-title,.case-title,.case-media,.cs-hero-frame').forEach(function(el) {
        el.classList.add('vt-shown');
        var w = el.closest('.reveal');
        if (w) w.classList.add('vt-shown');
      });
    });
    </script>
</head>

<body class="theme-cyan">

    <div class="grain" aria-hidden="true"></div>

                src="imgs/ig logo.png" alt=""></a>
    </header>

    <main>
        <section class="page-hero">
            <p class="kicker reveal">Error 404</p>
            <h1 class="page-title ink-split">Lost in space</h1>
            <p class="page-sub reveal">This page drifted off into another dimension. Let's get you back to something
                real.</p>
            <p class="error-actions reveal">
                <a class="btn-ghost" href="index.html">Back to home</a>
                <a class="btn-ghost" href="CreativeTechnology.html">See the work</a>
            </p>
        </section>

            <span>© 2026 Justin Dormitzer</span>
